# Nginx Configuration for Ghiras Club
# Two separate backends: myaboughaith.com on port 8000, clubbariaa on port 8001
# Save as: /etc/nginx/sites-available/ghiras
# Then: sudo ln -s /etc/nginx/sites-available/ghiras /etc/nginx/sites-enabled/ghiras
# Finally: sudo nginx -s reload

# Backend for myaboughaith.com (port 8000)
upstream backend_main {
    server 127.0.0.1:8000;
}

# Backend for clubbariaa.myaboughaith.com (port 8001)
upstream backend_clubbariaa {
    server 127.0.0.1:8001;
}

# ==================== myaboughaith.com ====================
server {
    listen 80;
    listen [::]:80;
    server_name myaboughaith.com www.myaboughaith.com;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name myaboughaith.com www.myaboughaith.com;

    # SSL Certificates (Use Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/myaboughaith.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/myaboughaith.com/privkey.pem;
    
    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Root directory for frontend
    root /home/username/ghiras97/frontend/build;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css text/javascript application/json application/javascript;
    gzip_min_length 1000;

    # Backend API proxy -> port 8000
    location /api/ {
        proxy_pass http://backend_main/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Frontend static files
    location / {
        try_files $uri /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
}

# ==================== clubbariaa.myaboughaith.com ====================
server {
    listen 80;
    listen [::]:80;
    server_name clubbariaa.myaboughaith.com;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
